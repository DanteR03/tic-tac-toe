<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
  <script src="tictac.js" defer></script>
</head>

<body>
  <div class="main-container">
    <h1>Tic Tac Toe</h1>
    <div class="board-container">
      <div class="cell" id="cell1" data-num="0"></div>
      <div class="cell" id="cell2" data-num="1"></div>
      <div class="cell" id="cell3" data-num="2"></div>
      <div class="cell" id="cell4" data-num="3"></div>
      <div class="cell" id="cell5" data-num="4"></div>
      <div class="cell" id="cell6" data-num="5"></div>
      <div class="cell" id="cell7" data-num="6"></div>
      <div class="cell" id="cell8" data-num="7"></div>
      <div class="cell" id="cell9" data-num="8"></div>
    </div>
    <p></p>
  </div>
</body>
</html>
