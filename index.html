<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
  <script src="tictac.js" defer></script>
</head>

<body>
  <div class="main-container">
    <h1>Tic Tac Toe</h1>
    <div class="board-container">
      <div class="cell" id="cell1">X</div>
      <div class="cell" id="cell2">O</div>
      <div class="cell" id="cell3">X</div>
      <div class="cell" id="cell4">O</div>
      <div class="cell" id="cell5"></div>
      <div class="cell" id="cell6">O</div>
      <div class="cell" id="cell7">X</div>
      <div class="cell" id="cell8"></div>
      <div class="cell" id="cell9">X</div>
    </div>
  </div>
</body>
</html>
